name: QA

on:
  pull_request:

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      # Pin snapshot tests to the CPU `tiny-skia` backend so output
      # is byte-identical across CI hardware (no GPU required).
      ICED_TEST_BACKEND: tiny-skia
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: cargo test
        run: cargo test --workspace

  publish-dry:
    name: Publish (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: cargo publish --dry-run
        run: cargo publish -p iced_ui --dry-run
