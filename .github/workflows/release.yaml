name: Release

on:
  workflow_run:
    workflows: [QA]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    # workflow_run fires for any conclusion; only proceed on success.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['crates/iced_ui--release_created'] }}
      tag_name: ${{ steps.release.outputs['crates/iced_ui--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: ./.github/actions/setup
      - name: cargo publish
        run: cargo publish -p iced_ui --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
