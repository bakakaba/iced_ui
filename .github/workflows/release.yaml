name: Release

on:
  workflow_run:
    workflows: [QA]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    # workflow_run fires for any conclusion; only proceed on success.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['crates/iced_ui--release_created'] }}
      tag_name: ${{ steps.release.outputs['crates/iced_ui--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: ./.github/actions/setup
      - name: cargo publish
        run: cargo publish -p iced_ui --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-demo:
    name: Build demo (${{ matrix.target }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin: demo
            asset: demo-x86_64-unknown-linux-gnu
          - target: aarch64-apple-darwin
            os: macos-latest
            bin: demo
            asset: demo-aarch64-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: demo.exe
            asset: demo-x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Linux deps for iced
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libfontconfig1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: demo-${{ matrix.target }}

      - name: Build demo
        run: cargo build -p demo --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: mv "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.asset }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" "${{ matrix.asset }}" --clobber
